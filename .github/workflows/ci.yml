# 时机，发起pr的时候
on: pull_request

# 执行jobs
jobs:
  test:
    name: 测试透传上下文
    runs-on: ubuntu-latest # 运行在ubuntu最新版本上
    
    steps:
      - name: 读取仓库代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 拉取完整历史，确保 diff 始终可用
      
      - name: 设置go版本
        uses: actions/setup-go@v3
        with:
          go-version: 1.23
      
      - name: 安装依赖
        run: go mod tidy
      
      - name: 执行测试验证上下文透传逻辑
        run: cd demo && go test -v ./e2e_test.go

      - name: 执行单测脚本
        run: curl -fsSL https://raw.githubusercontent.com/shuaibizhang/codecoverage/bingozhang/tools/go/ut_test.sh | bash